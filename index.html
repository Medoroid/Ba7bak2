<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🎉 مفاجأة عيد ميلاد</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Cairo",sans-serif;}

body{
min-height:100vh;
background:linear-gradient(135deg,#ff9ecb,#ffd6ec,#fff0f6);
display:flex;
justify-content:center;
align-items:flex-start;
overflow-x:hidden;
}

.container{max-width:420px;width:100%;padding:25px;}

.title{
text-align:center;
font-size:30px;
font-weight:800;
color:#ff2e7a;
margin-top:30px;
}

.card{
background:rgba(255,255,255,.6);
padding:25px;
border-radius:20px;
margin-top:30px;
}

.card input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:10px;
}

.btn{
margin-top:15px;
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#ff2e7a;
color:white;
cursor:pointer;
}

.error{
color:red;
display:none;
text-align:center;
margin-top:10px;
}

.welcome,.gallery{display:none;margin-top:20px;text-align:center;}

.hero{
width:100%;
border-radius:15px;
}

.progress{
width:100%;
height:10px;
background:#eee;
border-radius:50px;
overflow:hidden;
margin-top:15px;
}

.bar{
height:100%;
width:0%;
background:#ff2e7a;
}

.photo{
background:white;
border-radius:15px;
margin-top:15px;
padding:10px;
}

.photo img{
width:100%;
border-radius:10px;
}

.heart{
position:fixed;
bottom:-50px;
animation:float 6s linear infinite;
}

@keyframes float{
100%{transform:translateY(-120vh) rotate(360deg);}
}
</style>
</head>

<body>

<div class="container">

<h1 class="title">🎉 مفاجأة عيد ميلاد 🎉</h1>

<div class="card" id="login">
<input id="name" placeholder="اكتب الاسم">
<input id="Password" type="password" placeholder="اكتب التاريخ">
<button class="btn" onclick="login()">دخول</button>
<div class="error" id="error">البيانات غلط ❌</div>
</div>

<div class="welcome" id="welcome">

<img class="hero" src="https://images.unsplash.com/photo-1464349095431-e9a21285b5f3">

<h2 style="color:#ff2e7a">كل سنة وانتي طيبة ❤️</h2>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

</div>

<div class="gallery" id="gallery"></div>

</div>

<audio id="music" loop>
<source src="FDownload.app-1558934188547192-(320kbps).mp3">
</audio>

<script>

const correctName="Ba7bak"
const correctPassword="2002-07-17"

const photos=[ { img:"img-1.jpeg", text:"كل سنة وانتي أجمل حاجة حصلت في حياتي ❤️" }, { img:"img-2.jpeg", text:"كل سنة وانتي أجمل حاجة حصلت في حياتي ❤️" }, { img:"img-3.jpeg", text:"النهارده مش يوم عادي خالص ده اليوم اللي الدنيا بقت أحلى فيه عشان اتولدت 🎂✨" }, { img:"img-4.jpeg", text:"كل سنة وانتي أقرب حد لقلبي… وكل سنة وانتي السبب في إني أبقى مبسوط من غير سبب 🤍" }, { img:"img-5.jpeg", text:"نفسي أكون جنبك في كل لحظة، وأفضل دايمًا الشخص اللي يخليكي تضحكي حتى لو الدنيا زعلتك 🥺💗" }, { img:"img-6.jpeg", text:"كل مرة ببصلك بحس إني كسبت الدنيا كلها… وبقول لنفسي إزاي كنت عايش من غيرك قبل كده؟" }, { img:"img-7.jpeg", text:"وكل سنة وانتي السبب في إني أبقى مبسوط من غير سبب ❤️" }, { img:"img-8.jpeg", text:"النهارده مش يوم عادي خالص… ده اليوم اللي الدنيا بقت أحلى فيه عشان منه اتولدت 🎂✨" }, { img:"img-9.jpeg", text:"بحبك جدًا… وكل سنة وانتي ليا 💋" }, { img:"img-10.jpeg", text:"بحبك يا منه حب ملوش آخر… " } ]

function login(){
let name=document.getElementById("name").value
let Password=document.getElementById("Password").value
let error=document.getElementById("error")

if(name!==correctName || Password!==correctPassword){
error.style.display="block"
return
}

document.getElementById("login").style.display="none"
document.getElementById("welcome").style.display="block"

document.getElementById("music").play().catch(()=>{})

startLoading()
}

function startLoading(){

let bar=document.getElementById("bar")
let width=0

let interval=setInterval(()=>{

width++
bar.style.width=width+"%"

if(width>=100){
clearInterval(interval)
showGallery()
}

},30)

}

function showGallery(){

let gallery=document.getElementById("gallery")
gallery.style.display="block"

photos.forEach(p=>{
gallery.innerHTML+=`
<div class="photo">
<img src="${p.img}" onerror="this.src='https://via.placeholder.com/300'">
<h5>${p.text}</h5>
</div>`
})

}

/* hearts */
setInterval(()=>{
let heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="💖"
heart.style.left=Math.random()*100+"vw"
document.body.appendChild(heart)
setTimeout(()=>heart.remove(),6000)
},400)

</script>

</body>
</html>
